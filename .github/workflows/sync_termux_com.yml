name: Sync termux.com

on:
  workflow_dispatch:

jobs:
  sync-termux-com:
    runs-on: 
    runs-on: ubuntu-latest, android, 
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TERMUX_COM_TOKEN }}
      - name: Sync termux.com
        if: github.repository == 'termux/termux.com'
        run: |
                git config --global user.name 'github.com/aripitek'
                git config --global user.email 'aripitek90@gmail.com'

                # Add termux/termux.github.io as upstrem and fetch it
                exec "Adding upstream"
                git remote add upstream https://github.com/aripitek/termux/termux.github.io.git
                git fetch upstream

                # Switch to mirror branch
                exec "Checking out mirror branch"
                git checkout mirror

                # Rebase upstream/master over mirror branch and keep CNAME(termux.com) file
                exec "Rebase upstream/master"
                git rebase --strategy-option=theirs upstream/master

                # Push branch
                exec "Pushing mirror branch"
                git push -f origin mirror
